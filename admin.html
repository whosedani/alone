<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>alone — admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F7FA;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .admin-card {
      background: white;
      border-radius: 16px;
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    .admin-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .admin-subtitle {
      font-size: 0.85rem;
      color: #8B8FA3;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #8B8FA3;
      margin-bottom: 0.5rem;
    }

    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .field input:focus {
      border-color: #5BA3D9;
    }

    .save-btn {
      width: 100%;
      padding: 0.85rem;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1rem;
      transition: opacity 0.3s ease;
    }

    .save-btn:hover {
      opacity: 0.85;
    }

    .save-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
      min-height: 1.2em;
    }

    .status.success { color: #7EC882; }
    .status.error { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="admin-card">
    <div class="admin-title">alone config</div>
    <div class="admin-subtitle">Update site configuration</div>

    <div class="field">
      <label>Contract Address (CA)</label>
      <input type="text" id="ca" placeholder="Paste contract address...">
    </div>
    <div class="field">
      <label>Twitter URL</label>
      <input type="text" id="twitter" placeholder="https://twitter.com/...">
    </div>
    <div class="field">
      <label>Community URL</label>
      <input type="text" id="community" placeholder="https://twitter.com/i/communities/...">
    </div>
    <div class="field">
      <label>Buy URL</label>
      <input type="text" id="buy" placeholder="https://jup.ag/swap/SOL-...">
    </div>
    <hr style="border: none; border-top: 1px solid rgba(0,0,0,0.06); margin: 1.5rem 0;">
    <div class="field">
      <label>Admin Password</label>
      <input type="password" id="password" placeholder="Enter admin password">
    </div>

    <button class="save-btn" id="save-btn">Save Configuration</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const fields = { ca: 'CA', twitter: 'TWITTER_URL', community: 'COMMUNITY_URL', buy: 'BUY_URL' };

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        if (res.ok) {
          const data = await res.json();
          if (data) {
            if (data.CA) document.getElementById('ca').value = data.CA;
            if (data.TWITTER_URL) document.getElementById('twitter').value = data.TWITTER_URL;
            if (data.COMMUNITY_URL) document.getElementById('community').value = data.COMMUNITY_URL;
            if (data.BUY_URL) document.getElementById('buy').value = data.BUY_URL;
          }
        }
      } catch (e) {
        // silent
      }
    }

    async function sha256(message) {
      const encoder = new TextEncoder();
      const data = encoder.encode(message);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('save-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-btn');
      const status = document.getElementById('status');
      const password = document.getElementById('password').value;

      if (!password) {
        status.textContent = 'Password required';
        status.className = 'status error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving...';
      status.textContent = '';

      try {
        const passwordHash = await sha256(password);
        const config = {};
        for (const [id, key] of Object.entries(fields)) {
          const val = document.getElementById(id).value.trim();
          if (val) config[key] = val;
        }

        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...config, passwordHash })
        });

        if (res.ok) {
          status.textContent = 'Saved successfully';
          status.className = 'status success';
        } else {
          const data = await res.json().catch(() => ({}));
          status.textContent = data.error || 'Save failed';
          status.className = 'status error';
        }
      } catch (e) {
        status.textContent = 'Network error';
        status.className = 'status error';
      }

      btn.disabled = false;
      btn.textContent = 'Save Configuration';
    });

    loadConfig();
  </script>
</body>
</html>
